<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="cache-control" content="no-store">
<title>Contract Exchange &mdash; private demo</title>
<style>
  :root{ --ink:#17242C; --band:#132530; --grey:#4C5B64; --line:#E3EAED; --mint-d:#3E8F7C; }
  *{box-sizing:border-box; margin:0}
  body{
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--band); color:var(--ink);
    min-height:100vh; display:grid; place-items:center; padding:24px;
  }
  .card{
    width:100%; max-width:380px; background:#fff; border-radius:16px;
    padding:34px 30px 28px; box-shadow:0 18px 50px rgba(0,0,0,.28);
  }
  .overline{font-size:10px; font-weight:800; letter-spacing:.22em; color:var(--grey); text-transform:uppercase}
  h1{font-size:19px; font-weight:800; letter-spacing:-.01em; margin:6px 0 6px}
  p.sub{font-size:12.8px; color:var(--grey); margin-bottom:18px}
  label{display:block; font-size:11.5px; font-weight:700; margin-bottom:6px}
  input{
    width:100%; font:inherit; padding:11px 12px; border:1px solid var(--line);
    border-radius:9px; background:#F7FAFB;
  }
  input:focus{outline:2px solid var(--ink); outline-offset:1px; background:#fff}
  button{
    width:100%; margin-top:12px; appearance:none; border:0; cursor:pointer;
    background:var(--ink); color:#fff; font:inherit; font-weight:750;
    padding:11px 14px; border-radius:9px;
  }
  button:disabled{opacity:.6; cursor:default}
  .err{margin-top:11px; font-size:12.3px; color:#B3261E; min-height:17px}
  .foot{margin-top:16px; padding-top:14px; border-top:1px solid var(--line); font-size:11px; color:var(--grey)}
</style>
</head>
<body>
  <main class="card">
    <span class="overline">Contract Exchange</span>
    <h1>Private demo</h1>
    <p class="sub">Enter the passphrase Sam shared with you.</p>
    <form id="f" autocomplete="off">
      <label for="pw">Passphrase</label>
      <input id="pw" type="password" placeholder="Passphrase" autofocus>
      <button id="go" type="submit">Unlock</button>
      <div class="err" id="err" role="alert"></div>
    </form>
    <div class="foot">Deal walkthrough &middot; v3 trial-first &middot; illustrative figures only</div>
  </main>

function b64ToBytes(b64) {
  var bin = atob(b64), out = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function unlock(password) {
  var enc = new TextEncoder();
  var baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  var key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64ToBytes(PAYLOAD.salt), iterations: PAYLOAD.it, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
  var plain = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: b64ToBytes(PAYLOAD.iv) },
    key,
    b64ToBytes(PAYLOAD.ct)
  );
  return new TextDecoder().decode(plain);
}

function showPage(html) {
  var parsed = new DOMParser().parseFromString(html, "text/html");
  document.replaceChild(document.importNode(parsed.documentElement, true), document.documentElement);
  // Imported <script> nodes never execute; re-create them so they do.
  var scripts = Array.prototype.slice.call(document.querySelectorAll("script"));
  scripts.forEach(function (old) {
    var s = document.createElement("script");
    for (var i = 0; i < old.attributes.length; i++) {
      s.setAttribute(old.attributes[i].name, old.attributes[i].value);
    }
    s.textContent = old.textContent;
    old.parentNode.replaceChild(s, old);
  });
  window.scrollTo(0, 0);
}

document.getElementById("f").addEventListener("submit", async function (e) {
  e.preventDefault();
  var pw = document.getElementById("pw").value;
  var err = document.getElementById("err");
  var go = document.getElementById("go");
  if (!pw) { err.textContent = "Enter the passphrase to continue."; return; }
  go.disabled = true; go.textContent = "Unlocking\u2026"; err.textContent = "";
  try {
    var html = await unlock(pw);
    showPage(html);
  } catch (ex) {
    err.textContent = "That passphrase isn't right \u2014 check with Sam.";
    go.disabled = false; go.textContent = "Unlock";
    document.getElementById("pw").select();
  }
});
</script>
